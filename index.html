<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback – Frey Gartenbau</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3f7f1;
      --card: rgba(255, 255, 255, 0.92);
      --text: #1e241f;
      --muted: #6a746b;
      --accent: #2f5135;
      --accent-soft: #7aa36f;
      --accent-light: #e7f4e3;
      --border: rgba(214, 224, 214, 0.9);
      --star-on: #f4b400;
      --star-off: #d7ddd4;
      --glow: 0 24px 60px rgba(30, 60, 40, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,0.9) 0%, transparent 45%),
        radial-gradient(circle at 88% 18%, rgba(207, 226, 205, 0.65) 0%, transparent 55%),
        radial-gradient(circle at 20% 85%, rgba(164, 199, 152, 0.35) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(125, 167, 112, 0.25) 0%, transparent 50%),
        linear-gradient(180deg, #f4f8f2 0%, #e6efe2 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: -20% -10% auto -10%;
      height: 55vh;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.85), transparent 60%),
        radial-gradient(circle at 70% 20%, rgba(122,163,111,0.25), transparent 60%);
      filter: blur(10px);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='180' viewBox='0 0 240 180' fill='none'><g stroke='%23d7e4d3' stroke-width='1' opacity='0.35'><path d='M0 120c40-20 80-30 120-30s80 10 120 30'/><path d='M0 150c40-20 80-30 120-30s80 10 120 30'/></g></svg>");
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }

    .shell {
      width: 100%;
      max-width: 860px;
      display: grid;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--glow);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -40% 55% 0 -40%;
      background: radial-gradient(circle at 30% 30%, rgba(122,163,111,0.2), transparent 65%);
      pointer-events: none;
    }

    .brand {
      display: grid;
      gap: 8px;
      align-items: center;
      justify-items: center;
      margin-bottom: 10px;
    }

    .logo {
      width: min(220px, 60vw);
      height: auto;
      display: block;
    }

    .headline {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-size: clamp(26px, 4vw, 34px);
      margin: 6px 0 8px 0;
      letter-spacing: 0.2px;
      text-align: center;
    }

    .subline {
      margin: 0 0 20px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
    }

    .stars {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin: 16px 0 6px 0;
      user-select: none;
    }

    .star {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 14px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      will-change: transform;
    }

    .star:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: #c6d4c2;
      box-shadow: 0 6px 14px rgba(30, 60, 40, 0.12);
    }

    .star .icon {
      width: 28px;
      height: 28px;
      color: var(--star-off);
      transition: color 0.2s ease, filter 0.2s ease;
    }

    .star.active .icon,
    .star.hovered .icon {
      color: var(--star-on);
      filter: drop-shadow(0 2px 6px rgba(244,180,0,0.45));
    }

    .star .label {
      position: absolute;
      bottom: 6px;
      font-size: 11px;
      color: var(--muted);
      transition: color 0.2s ease;
    }

    .star.hovered .label {\n      color: #2b6a38;\n    }

    .selected {
      margin: 12px 0 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
    }

    .selected-pill {
      padding: 6px 14px;
      border-radius: 999px;
      background: #f5f8f3;
      border: 1px solid rgba(206, 221, 206, 0.9);
      color: #2f6b3a;
      font-size: 13px;
      letter-spacing: 0.2px;
      transform: translateY(4px);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .selected-pill.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .selected-pill.preview {\n      background: rgba(231, 244, 227, 0.7);\n      color: #2b6a38;\n    }

    .form {
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
      display: none;
    }

    .form.visible { display: block; }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 12px 0 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field {
      position: relative;
    }

    textarea, input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 14px 44px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      background: #fff;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      top: 12px;
      width: 18px;
      height: 18px;
      color: #94b091;
    }

    textarea:focus, input:focus {
      border-color: #c6d4c2;
      box-shadow: 0 0 0 3px rgba(47, 81, 53, 0.08);
      background: #fcfffb;
    }

    button {
      margin-top: 14px;
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.08s ease;
    }

    button:hover { background: #27422b; }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }

    .status.visible { display: block; }
    .status.success { color: #1c7a45; }
    .status.error { color: #b01e1e; }

    .footer {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="shell" id="app">
    <section class="card">
      <div class="brand">
        <img class="logo" src="logo_frey_gartenbau.jpg" alt="Frey Gartenbau" />
      </div>

      <h1 class="headline" id="headline"></h1>
      <p class="subline">Wir freuen uns über dein Feedback und deine Bewertung.</p>

      <div class="stars" id="stars"></div>
      <div class="selected"><span class="selected-pill" id="selected">Noch keine Auswahl.</span></div>

      <form class="form" id="form" novalidate>
        <label for="message">Feedback</label>
        <div class="field">
          <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M5 4h14a2 2 0 0 1 2 2v9.5a2 2 0 0 1-2 2h-6l-4.5 3.5V17H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
          </svg>
          <textarea id="message" rows="4" minlength="5" required placeholder="Was können wir verbessern?"></textarea>
        </div>

        <label for="email">E-Mail (optional)</label>
        <div class="field">
          <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm0 2v.01L12 12l8-4.99V7H4z" />
          </svg>
          <input id="email" type="email" placeholder="name@example.com" />
        </div>

        <button id="submit" type="submit">Feedback senden</button>
        <div class="status" id="status"></div>
      </form>
    </section>

    <div class="footer">Danke für deine Zeit. Deine Rückmeldung hilft uns sehr.</div>
  </main>

  <script>
    // Konfiguration
    const BUSINESS_NAME = "Frey Gartenbau";
    const GOOGLE_REVIEW_URL = "https://search.google.com/local/writereview?placeid=ChIJ5QYmLOMVkEcR8MORKwt1BmY";
    const FEEDBACK_ENDPOINT = "/api/feedback";

    const headline = document.getElementById("headline");
    const starsWrap = document.getElementById("stars");
    const selected = document.getElementById("selected");
    const form = document.getElementById("form");
    const message = document.getElementById("message");
    const email = document.getElementById("email");
    const submit = document.getElementById("submit");
    const status = document.getElementById("status");

    headline.textContent = "Wie zufrieden warst du mit unserer Arbeit?";

    let currentRating = 0;
    let hoverRating = 0;
    const labels = ["1 Stern", "2 Sterne", "3 Sterne", "4 Sterne", "5 Sterne"];

    function setPill(text, isPreview) {
      selected.textContent = text;
      selected.classList.toggle("preview", isPreview);
      selected.classList.add("visible");
    }

    function clearPill() {
      selected.textContent = "Noch keine Auswahl.";
      selected.classList.remove("preview");
      selected.classList.add("visible");
    }

    function renderStars() {
      starsWrap.innerHTML = "";
      for (let i = 1; i <= 5; i += 1) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "star";
        btn.dataset.value = String(i);
        btn.innerHTML = `
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 2.5l2.94 6.06 6.69.97-4.84 4.71 1.14 6.64L12 17.9l-5.93 3.12 1.14-6.64L2.37 9.53l6.69-.97L12 2.5z" />
          </svg>
          <span class="label">${labels[i - 1]}</span>
        `;

        btn.addEventListener("mouseenter", () => setHover(i));
        btn.addEventListener("mouseleave", () => setHover(0));
        btn.addEventListener("click", () => selectRating(i));
        starsWrap.appendChild(btn);
      }
      updateStarState();
      clearPill();
    }

    function setHover(value) {
      hoverRating = value;
      [...starsWrap.children].forEach((el, idx) => {
        el.classList.toggle("hovered", value > 0 && idx < value);
      });

      if (value > 0) {
        setPill(`Ausgewählt: ${labels[value - 1]}`, true);
      } else if (currentRating > 0) {
        setPill(`Ausgewählt: ${labels[currentRating - 1]}`, false);
      } else {
        clearPill();
      }
    }

    function updateStarState() {
      [...starsWrap.children].forEach((el, idx) => {
        el.classList.toggle("active", idx < currentRating);
      });
    }

    function resetStatus() {
      status.textContent = "";
      status.className = "status";
    }

    function selectRating(value) {
      currentRating = value;
      updateStarState();
      setPill(`Ausgewählt: ${labels[value - 1]}`, false);
      resetStatus();

      if (value >= 4) {
        window.location.href = GOOGLE_REVIEW_URL;
        return;
      }

      if (value >= 1 && value <= 3) {
        form.classList.add("visible");
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      resetStatus();

      const msg = message.value.trim();
      if (msg.length < 5) {
        status.textContent = "Bitte mindestens 5 Zeichen eingeben.";
        status.classList.add("visible", "error");
        return;
      }

      submit.disabled = true;

      try {
        const res = await fetch(FEEDBACK_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            businessName: BUSINESS_NAME,
            rating: currentRating,
            message: msg,
            email: email.value.trim() || null,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent
          })
        });

        if (!res.ok) {
          throw new Error("HTTP_ERROR");
        }

        const data = await res.json();
        if (!data || data.success !== true) {
          throw new Error("BAD_RESPONSE");
        }

        status.textContent = "Danke für dein Feedback.";
        status.classList.add("visible", "success");
        form.reset();
      } catch (err) {
        status.textContent = "Fehler beim Senden. Bitte später erneut versuchen.";
        status.classList.add("visible", "error");
      } finally {
        submit.disabled = false;
      }
    });

    renderStars();
  </script>
</body>
</html>
