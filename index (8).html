<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bewertung – Frey Gartenbau</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --moss:    #2d5a3d;
      --sage:    #4a7c5a;
      --fern:    #6da077;
      --bark:    #5c4a35;
      --gold:    #c9a84c;
      --gold-l:  #e8c96a;
      --text-dk: #1a2518;
      --text-md: #3d4f3a;
      --text-lt: #6b7d67;
      --star-on: #c9a84c;
      --star-off:#c8d4c4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─────────────────────────────────────────
       BASE: mobile-first, normal scroll
    ───────────────────────────────────────── */
    html {
      height: 100%;
    }
    body {
      font-family: "DM Sans", sans-serif;
      min-height: 100%;
      /* Normal scroll — no overflow:hidden */
      background: #0e1f13;
      position: relative;
    }

    /* ── FIXED BACKGROUND (doesn't scroll) ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sky {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 100% 55% at 50% 0%,   #1f4a28 0%, transparent 65%),
        radial-gradient(ellipse 80%  40% at 20% 10%,  #2a5e34 0%, transparent 55%),
        radial-gradient(ellipse 120% 60% at 50% 100%, #080f09 0%, transparent 70%),
        linear-gradient(180deg, #16321e 0%, #0e1a11 55%, #080e0a 100%);
    }

    .sunlight {
      position: absolute;
      top: -15%; left: 50%; transform: translateX(-50%);
      width: 80%; height: 60%;
      background: radial-gradient(ellipse at 50% 0%, rgba(200,230,160,0.13) 0%, transparent 70%);
      filter: blur(25px);
      animation: breathe 12s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.6} }

    .shaft {
      position: absolute; top: -5%; height: 100%; width: 100px;
      background: linear-gradient(180deg, rgba(220,255,200,0.055) 0%, transparent 80%);
      filter: blur(22px); border-radius: 50%;
      transform-origin: top center;
    }
    .s1{left:18%;animation:sw 18s ease-in-out infinite;}
    .s2{left:48%;animation:sw 23s ease-in-out infinite reverse;width:140px;opacity:.7;}
    .s3{left:74%;animation:sw 15s ease-in-out infinite 3s;opacity:.5;}
    @keyframes sw{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(5deg)}}

    .mist {
      position: absolute;
      bottom: -8%; left: -20%; right: -20%; height: 50%;
      background: radial-gradient(ellipse 100% 55% at 50% 100%, rgba(100,160,100,0.09) 0%, transparent 70%);
      filter: blur(18px);
      animation: mistDrift 28s ease-in-out infinite;
    }
    @keyframes mistDrift{0%,100%{transform:translateX(0)}50%{transform:translateX(2.5%)}}

    /* Plants */
    .plant {
      position: absolute; bottom: 0;
      transform-origin: bottom center;
    }
    .sw1{animation:sway1 6s   ease-in-out infinite; animation-delay:-1s;}
    .sw2{animation:sway2 7.5s ease-in-out infinite; animation-delay:-3s;}
    .sw3{animation:sway1 5.5s ease-in-out infinite; animation-delay:-2s;}
    .sw4{animation:sway2 8.5s ease-in-out infinite; animation-delay:-4s;}
    .sw5{animation:sway1 7s   ease-in-out infinite; animation-delay:-2.5s;}
    @keyframes sway1{0%,100%{transform:rotate(0)}30%{transform:rotate(-2.5deg)}70%{transform:rotate(2deg)}}
    @keyframes sway2{0%,100%{transform:rotate(0)}30%{transform:rotate(2.5deg)}70%{transform:rotate(-2deg)}}

    .grass-svg { position:absolute; bottom:0; left:-5%; width:110%; }

    .particle {
      position:absolute; border-radius:50%;
      background:rgba(240,255,210,0.65);
      animation:floatUp linear infinite;
    }
    @keyframes floatUp{
      0%{transform:translateY(0) translateX(0) scale(1);opacity:0;}
      8%{opacity:1;} 92%{opacity:.4;}
      100%{transform:translateY(-95vh) translateX(var(--dx)) scale(.3);opacity:0;}
    }

    /* ─────────────────────────────────────────
       PAGE WRAPPER — centres card, allows scroll
    ───────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 40px;
    }

    /* ─────────────────────────────────────────
       CARD
    ───────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 480px;
      animation: riseIn .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes riseIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    .card {
      background: rgba(248,244,237,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 4px 6px rgba(0,0,0,0.07),
        0 20px 60px rgba(0,0,0,0.45),
        0 60px 120px rgba(0,0,0,0.25);
    }

    /* parchment noise */
    .card-inner {
      position: relative;
      padding: 28px 24px 32px;
    }
    .card-inner::before {
      content:""; position:absolute; inset:0; pointer-events:none; opacity:.02;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/></filter><rect width='256' height='256' filter='url(%23n)'/></svg>");
    }

    /* ── LOGO BANNER ── */
    .brand {
      background: #ffffff;
      border-bottom: 1px solid rgba(168,201,160,0.28);
      padding: 28px 24px 24px;
      text-align: center;
    }
    .logo { width: min(240px, 70vw); height: auto; display: inline-block; }

    /* ── HEADLINE ── */
    .headline {
      font-family: "Playfair Display", serif;
      font-size: clamp(20px, 5.5vw, 26px);
      font-weight: 500;
      color: var(--text-dk);
      text-align: center;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .subline {
      text-align: center;
      font-size: 14px;
      color: var(--text-lt);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ── STARS ── */
    .stars {
      display: grid;
      grid-template-columns: repeat(5,1fr);
      gap: 8px;
      margin-bottom: 12px;
      user-select: none;
      /* make touch targets big enough on mobile */
      touch-action: manipulation;
    }
    .star-btn {
      appearance: none;
      border: 1.5px solid rgba(45,90,61,0.38);
      background: rgba(255,255,255,.88);
      border-radius: 16px;
      padding: 16px 4px 12px;
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      cursor: pointer;
      /* min touch target */
      min-height: 72px;
      box-shadow: 0 2px 6px rgba(20,50,25,0.1), inset 0 1px 0 rgba(255,255,255,0.95);
      transition: all .18s cubic-bezier(.34,1.56,.64,1);
      -webkit-tap-highlight-color: transparent;
    }
    .star-btn:active { transform: scale(0.96); }
    @media(hover:hover){
      .star-btn:hover{transform:translateY(-3px) scale(1.05);border-color:rgba(45,90,61,0.65);box-shadow:0 8px 20px rgba(30,60,40,.18),inset 0 1px 0 rgba(255,255,255,0.95);background:#fff;}
    }

    .star-icon{width:28px;height:28px;color:var(--star-off);transition:color .15s,transform .15s,filter .15s;}
    .star-num {font-size:11px;font-weight:500;color:var(--text-lt);transition:color .15s;}

    .star-btn.lit,.star-btn.preview{background:rgba(255,251,240,.98);border-color:rgba(201,168,76,.5);}
    .star-btn.lit .star-icon,.star-btn.preview .star-icon{color:var(--star-on);filter:drop-shadow(0 2px 8px rgba(201,168,76,.6));transform:scale(1.12);}
    .star-btn.lit .star-num,.star-btn.preview .star-num{color:var(--bark);}

    /* ── PILL ── */
    .pill-wrap{min-height:32px;display:flex;justify-content:center;align-items:center;margin-bottom:4px;}
    .pill{
      display:inline-flex;align-items:center;
      padding:6px 18px;border-radius:999px;
      background:rgba(45,90,61,.07);border:1px solid rgba(45,90,61,.15);
      color:var(--moss);font-size:13px;font-weight:500;
      opacity:0;transform:translateY(4px);
      transition:opacity .2s,transform .2s;
    }
    .pill.show{opacity:1;transform:translateY(0);}
    .pill.gold{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:#7a5e1a;}

    /* ── FORM ── */
    .form-panel{display:none;margin-top:24px;padding-top:24px;border-top:1px solid rgba(168,201,160,.35);animation:riseIn .35s cubic-bezier(.22,1,.36,1) both;}
    .form-panel.visible{display:block;}

    .form-title{font-family:"Playfair Display",serif;font-size:18px;font-style:italic;font-weight:500;color:var(--text-dk);margin-bottom:3px;}
    .form-subtitle{font-size:12.5px;color:var(--text-lt);margin-bottom:18px;}
    .field-label{display:block;font-size:11px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text-md);margin-bottom:6px;}
    .field-wrap{position:relative;margin-bottom:14px;}
    .field-wrap svg{position:absolute;left:13px;top:14px;width:16px;height:16px;color:var(--fern);pointer-events:none;}

    textarea, input[type="email"]{
      width:100%;border:1.5px solid rgba(168,201,160,.55);border-radius:14px;
      /* font-size 16px prevents iOS auto-zoom */
      padding:13px 13px 13px 40px;
      font-family:"DM Sans",sans-serif;font-size:16px;color:var(--text-dk);
      background:rgba(255,255,255,.85);outline:none;resize:none;
      -webkit-appearance:none;
      transition:border-color .2s,box-shadow .2s,background .2s;
    }
    textarea:focus,input:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(74,124,90,.1);background:#fff;}
    textarea::placeholder,input::placeholder{color:#b5bfb2;}

    .submit-btn{
      width:100%;height:52px;border:none;border-radius:14px;
      background:linear-gradient(135deg,#2d5a3d 0%,#1a3320 100%);
      color:#f5f0e8;font-family:"DM Sans",sans-serif;font-size:16px;font-weight:500;
      letter-spacing:.04em;cursor:pointer;margin-top:4px;
      box-shadow:0 4px 16px rgba(26,51,32,.3);
      transition:opacity .2s,transform .1s,box-shadow .2s;
      position:relative;overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }
    .submit-btn::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,transparent 100%);}
    .submit-btn:active{opacity:.88;transform:scale(.98);}
    @media(hover:hover){.submit-btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 7px 22px rgba(26,51,32,.4);}}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    .status-msg{margin-top:10px;font-size:13.5px;text-align:center;display:none;padding:11px 14px;border-radius:12px;}
    .status-msg.visible{display:block;}
    .status-msg.success{background:rgba(45,90,61,.08);border:1px solid rgba(45,90,61,.2);color:var(--moss);}
    .status-msg.error{background:rgba(176,30,30,.06);border:1px solid rgba(176,30,30,.15);color:#8b1a1a;}

    .footer-text{text-align:center;margin-top:18px;font-size:12px;color:rgba(180,210,170,.4);letter-spacing:.04em;}

    /* ─────────────────────────────────────────
       DESKTOP: bigger, keep plants/grass visible
    ───────────────────────────────────────── */
    @media(min-width:700px){
      .page { padding: 40px 24px 56px; }
      .brand { padding: 36px 40px 30px; }
      .logo  { width: min(280px, 55vw); }
      .card-inner { padding: 36px 40px 44px; }
      .headline { font-size: clamp(22px, 4vw, 28px); margin-bottom: 10px; }
      .subline  { font-size: 14.5px; margin-bottom: 32px; }
      .stars    { gap: 10px; }
      .star-btn { padding: 18px 6px 13px; border-radius: 18px; min-height: 82px; }
      .star-icon{ width: 32px; height: 32px; }
      .star-num { font-size: 12px; }
    }
  </style>
</head>

<!-- ═══ PAGE CONTENT ═══ -->
<div class="page">
  <div class="shell">
    <div class="card">

      <!-- LOGO BANNER -->
      <div class="brand">
        <img class="logo" src="logo_frey_gartenbau.jpg" alt="Frey Gartenbau" />
      </div>

      <!-- CONTENT -->
      <div class="card-inner">
        <h1 class="headline">Wie zufrieden waren Sie<br>mit unserer Arbeit?</h1>
        <p class="subline">Ihre Meinung hilft uns, noch besser zu werden.</p>

        <div class="stars" id="stars"></div>
        <div class="pill-wrap"><span class="pill" id="pill"></span></div>

        <div class="form-panel" id="formPanel">
          <div class="form-title">Was können wir verbessern?</div>
          <div class="form-subtitle">Ihr Feedback wird vertraulich behandelt.</div>
          <label class="field-label" for="msg">Ihre Nachricht</label>
          <div class="field-wrap">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 4h14a2 2 0 0 1 2 2v9.5a2 2 0 0 1-2 2h-6l-4.5 3.5V17H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
            <textarea id="msg" rows="4" placeholder="Was hat nicht Ihren Erwartungen entsprochen?" minlength="5" required></textarea>
          </div>
          <label class="field-label" for="mail">E-Mail (optional)</label>
          <div class="field-wrap">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm0 2v.01L12 12l8-4.99V7H4z"/></svg>
            <input id="mail" type="email" placeholder="name@beispiel.com" autocomplete="email"/>
          </div>
          <button class="submit-btn" id="submitBtn">Feedback absenden</button>
          <div class="status-msg" id="statusMsg"></div>
        </div>
      </div>
    </div>

    <div class="footer-text">Frey Gartenbau · Vielen Dank für Ihr Vertrauen</div>
  </div>
</div>

<script>
  /* particles */
  (function(){
    const w=document.getElementById("pts");
    for(let i=0;i<20;i++){
      const d=document.createElement("div");d.className="particle";
      const s=Math.random()*2.5+1.2,dx=(Math.random()-.5)*100;
      d.style.cssText=`left:${Math.random()*100}%;bottom:${Math.random()*18}%;width:${s}px;height:${s}px;--dx:${dx}px;animation-duration:${Math.random()*18+12}s;animation-delay:-${Math.random()*18}s;`;
      w.appendChild(d);
    }
  })();

  /* stars */
  const GOOGLE_URL="https://search.google.com/local/writereview?placeid=ChIJ5QYmLOMVkEcR8MORKwt1BmY";
  const FEEDBACK_EP="/api/feedback";
  const BNAME="Frey Gartenbau";
  const LBL=["1 Stern","2 Sterne","3 Sterne","4 Sterne","5 Sterne"];
  const starsEl=document.getElementById("stars"),pillEl=document.getElementById("pill");
  const formPanel=document.getElementById("formPanel"),msgEl=document.getElementById("msg");
  const mailEl=document.getElementById("mail"),submitBtn=document.getElementById("submitBtn");
  const statusMsg=document.getElementById("statusMsg");
  let cur=0;

  function showPill(t,g=false){pillEl.textContent=t;pillEl.classList.toggle("gold",g);pillEl.classList.add("show");}
  function hidePill(){pillEl.classList.remove("show");}
  function paint(n,prev=false){[...starsEl.children].forEach((b,i)=>{b.classList.remove("lit","preview");if(i<n)b.classList.add(prev?"preview":"lit");});}
  function resetSt(){statusMsg.textContent="";statusMsg.className="status-msg";}

  for(let v=1;v<=5;v++){
    const btn=document.createElement("button");
    btn.type="button";btn.className="star-btn";
    btn.innerHTML=`<svg class="star-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2.5l2.94 6.06 6.69.97-4.84 4.71 1.14 6.64L12 17.9l-5.93 3.12 1.14-6.64L2.37 9.53l6.69-.97L12 2.5z"/></svg><span class="star-num">${v}</span>`;
    btn.addEventListener("mouseenter",()=>{paint(v,true);showPill(LBL[v-1],v>=4);});
    btn.addEventListener("mouseleave",()=>{paint(cur);cur>0?showPill(LBL[cur-1],cur>=4):hidePill();});
    btn.addEventListener("click",()=>{
      cur=v;paint(v);showPill(LBL[v-1],v>=4);resetSt();
      if(v>=4){window.location.href=GOOGLE_URL;return;}
      formPanel.classList.add("visible");
      setTimeout(()=>msgEl.focus(),60);
    });
    starsEl.appendChild(btn);
  }

  submitBtn.addEventListener("click",async()=>{
    const t=msgEl.value.trim();
    if(t.length<5){statusMsg.textContent="Bitte mindestens 5 Zeichen eingeben.";statusMsg.className="status-msg visible error";return;}
    resetSt();submitBtn.disabled=true;
    try{
      const r=await fetch(FEEDBACK_EP,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({businessName:BNAME,rating:cur,message:t,email:mailEl.value.trim()||null,timestamp:new Date().toISOString(),userAgent:navigator.userAgent})});
      if(!r.ok)throw 0;
      const d=await r.json();if(!d||d.success!==true)throw 0;
      statusMsg.textContent="Vielen Dank – Ihr Feedback wurde übermittelt.";
      statusMsg.className="status-msg visible success";
      msgEl.value="";mailEl.value="";
    }catch{
      statusMsg.textContent="Fehler beim Senden. Bitte später nochmals versuchen.";
      statusMsg.className="status-msg visible error";
    }finally{submitBtn.disabled=false;}
  });
</script>
</body>
